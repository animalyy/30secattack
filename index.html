<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Tap Challenge Genesis v4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; background: #000; }
    body {
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // --- Firebase Configuration ---
    const safeFirebaseConfig = (() => {
      try {
        return typeof window.__firebase_config !== 'undefined' ? JSON.parse(window.__firebase_config) : null;
      } catch (e) {
        return null;
      }
    })();

    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'tap-challenge-genesis-v4';

    let db = null;
    let auth = null;
    if (safeFirebaseConfig) {
      const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(safeFirebaseConfig);
      auth = firebase.auth(app);
      db = firebase.firestore(app);
    }

    // 称号の閾値と演出の定義
    const LEVELS = [
      { min: 0, label: "ひよこ級", color: "text-slate-400", bg: "bg-slate-500", glow: "0 0 10px #94a3b8", theme: "#1e293b" },
      { min: 120, label: "見習い連打士", color: "text-green-400", bg: "bg-green-500", glow: "0 0 20px #4ade80", theme: "#064e3b" },
      { min: 240, label: "中堅連打士", color: "text-blue-400", bg: "bg-blue-500", glow: "0 0 25px #60a5fa", theme: "#1e3a8a" },
      { min: 360, label: "連打の達人", color: "text-purple-400", bg: "bg-purple-500", glow: "0 0 30px #c084fc", theme: "#581c87" },
      { min: 440, label: "音速の貴公子", color: "text-orange-400", bg: "bg-orange-500", glow: "0 0 35px #fb923c", theme: "#7c2d12" },
      { min: 500, label: "連打神", color: "text-red-500", bg: "bg-red-600", glow: "0 0 45px #ef4444", theme: "#7f1d1d" },
      { min: 540, label: "神速の解脱者", color: "text-yellow-200", bg: "bg-gradient-to-r from-yellow-400 via-white to-yellow-400", glow: "0 0 80px #fff", theme: "#27272a", ultimate: true },
      { min: 580, label: "閃光の渡り手", color: "text-amber-100", bg: "bg-gradient-to-r from-amber-300 via-yellow-100 to-amber-300", glow: "0 0 95px #fde68a", theme: "#2b2114", ultimate: true },
      { min: 620, label: "限界突破の指先", color: "text-amber-200", bg: "bg-gradient-to-r from-orange-400 via-amber-200 to-yellow-300", glow: "0 0 110px #fdba74", theme: "#34190d", ultimate: true },
      { min: 660, label: "連打星将", color: "text-sky-200", bg: "bg-gradient-to-r from-sky-400 via-cyan-200 to-blue-300", glow: "0 0 125px #7dd3fc", theme: "#0b1b33", ultimate: true },
      { min: 700, label: "連打皇帝", color: "text-rose-200", bg: "bg-gradient-to-r from-red-500 via-amber-300 to-red-500", glow: "0 0 140px #fda4af", theme: "#2d0b12", ultimate: true },
      { min: 720, label: "音速崩し", color: "text-fuchsia-200", bg: "bg-gradient-to-r from-fuchsia-500 via-violet-200 to-fuchsia-500", glow: "0 0 155px #e9d5ff", theme: "#240a2f", ultimate: true },
      { min: 740, label: "光冠の征服者", color: "text-yellow-50", bg: "bg-gradient-to-r from-yellow-300 via-white to-cyan-200", glow: "0 0 170px #ffffff", theme: "#1d2430", ultimate: true },
      { min: 760, label: "神域踏破者", color: "text-zinc-50", bg: "bg-gradient-to-r from-white via-zinc-100 to-white", glow: "0 0 190px #ffffff", theme: "#111827", ultimate: true },
      { min: 780, label: "指先の超新星", color: "text-cyan-50", bg: "bg-gradient-to-r from-white via-cyan-100 to-yellow-100", glow: "0 0 210px #e0f2fe", theme: "#0f172a", ultimate: true },
      { min: 800, label: "時間外存在", color: "text-indigo-100", bg: "bg-gradient-to-r from-indigo-400 via-white to-cyan-200", glow: "0 0 230px #c7d2fe", theme: "#111133", ultimate: true },
      { min: 820, label: "連打の地平突破者", color: "text-violet-100", bg: "bg-gradient-to-r from-violet-500 via-fuchsia-200 to-violet-500", glow: "0 0 250px #ddd6fe", theme: "#1b102c", ultimate: true },
      { min: 840, label: "白熱神話", color: "text-red-100", bg: "bg-gradient-to-r from-white via-red-200 to-white", glow: "0 0 280px #fecaca", theme: "#2a0f12", ultimate: true },
      { min: 850, label: "反応炉心", color: "text-white", bg: "bg-gradient-to-r from-white via-yellow-100 to-white", glow: "0 0 320px #ffffff", theme: "#050505", ultimate: true },
    ];

    function useSmoothValue(targetValue, factor = 0.15) {
      const [displayValue, setDisplayValue] = useState(targetValue);
      const rafRef = useRef();

      useEffect(() => {
        const animate = () => {
          setDisplayValue(prev => {
            const diff = targetValue - prev;
            if (Math.abs(diff) < 0.01) return targetValue;
            return prev + diff * factor;
          });
          rafRef.current = requestAnimationFrame(animate);
        };
        rafRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(rafRef.current);
      }, [targetValue, factor]);

      return displayValue;
    }

    function App() {
      const [user, setUser] = useState(null);
      const [score, setScore] = useState(0);
      const [highScore, setHighScore] = useState(0);
      const [history, setHistory] = useState([]);
      const [timeLeft, setTimeLeft] = useState(30.0);
      const [gameState, setGameState] = useState('idle');
      const [countdown, setCountdown] = useState(3);
      const [showHistory, setShowHistory] = useState(false);
      const [isLocked, setIsLocked] = useState(false);

      const [particles, setParticles] = useState([]);
      const [combo, setCombo] = useState(0);

      const smoothScore = Math.round(useSmoothValue(score));
      const smoothTime = useSmoothValue(timeLeft).toFixed(1);

      const finishLockRef = useRef(false);
      const highScoreRef = useRef(0);
      const scoreRef = useRef(0);
      const activeTouchIdsRef = useRef(new Set());
      const lastTapTimeRef = useRef(0);
      const touchHandledRef = useRef(false);
      const particleCleanupRef = useRef(null);

      const LOCAL_HIGH_KEY = `${appId}:highScore`;
      const LOCAL_HISTORY_KEY = `${appId}:history`;

      useEffect(() => { highScoreRef.current = highScore; }, [highScore]);
      useEffect(() => { scoreRef.current = score; }, [score]);

      useEffect(() => {
        return () => {
          if (particleCleanupRef.current) clearTimeout(particleCleanupRef.current);
        };
      }, []);

      const readLocalRecords = useCallback(() => {
        try {
          const localHigh = Number(localStorage.getItem(LOCAL_HIGH_KEY) || 0);
          const localHistory = JSON.parse(localStorage.getItem(LOCAL_HISTORY_KEY) || '[]');
          return {
            localHigh,
            localHistory: Array.isArray(localHistory) ? localHistory : []
          };
        } catch (e) {
          return { localHigh: 0, localHistory: [] };
        }
      }, []);

      const writeLocalRecords = useCallback((nextScore) => {
        const nowMs = Date.now();
        const { localHigh, localHistory } = readLocalRecords();
        const nextHigh = Math.max(localHigh, nextScore);
        const nextHistory = [{ score: nextScore, timestampMs: nowMs }, ...localHistory].slice(0, 15);

        try {
          localStorage.setItem(LOCAL_HIGH_KEY, String(nextHigh));
          localStorage.setItem(LOCAL_HISTORY_KEY, JSON.stringify(nextHistory));
        } catch (e) {}

        setHighScore(prev => Math.max(prev, nextHigh));
        setHistory(prev => {
          const normalizedPrev = prev.map(h => {
            if (h && h.timestamp && typeof h.timestamp.seconds === 'number') return h;
            if (h && typeof h.timestampMs === 'number') {
              return { ...h, timestamp: { seconds: Math.floor(h.timestampMs / 1000) } };
            }
            return h;
          });
          const merged = [
            { id: `local-${nowMs}`, score: nextScore, timestamp: { seconds: Math.floor(nowMs / 1000) }, timestampMs: nowMs },
            ...normalizedPrev
          ];
          return merged
            .sort((a, b) => {
              const at = a?.timestamp?.seconds || Math.floor((a?.timestampMs || 0) / 1000);
              const bt = b?.timestamp?.seconds || Math.floor((b?.timestampMs || 0) / 1000);
              return bt - at;
            })
            .slice(0, 15);
        });
      }, [readLocalRecords]);

      useEffect(() => {
        const { localHigh, localHistory } = readLocalRecords();
        if (localHigh) setHighScore(localHigh);
        if (localHistory.length) {
          setHistory(
            localHistory
              .map((h, i) => ({
                id: `boot-${h.timestampMs || i}`,
                score: h.score,
                timestamp: { seconds: Math.floor((h.timestampMs || Date.now()) / 1000) },
                timestampMs: h.timestampMs
              }))
              .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0))
              .slice(0, 15)
          );
        }
      }, [readLocalRecords]);

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await auth.signInWithCustomToken(window.__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (e) { console.error("Auth error", e); }
        };
        initAuth();
        return auth.onAuthStateChanged(setUser);
      }, []);

      useEffect(() => {
        if (!db || !user) return;
        const scoreDocRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stats').doc('overall');
        const unsubScore = scoreDocRef.onSnapshot((snap) => {
          if (snap.exists) setHighScore(prev => Math.max(prev, snap.data().highScore || 0));
        });

        const historyColRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('history');
        const unsubHistory = historyColRef.onSnapshot((snap) => {
          const remoteData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setHistory(prev => {
            const merged = [...prev, ...remoteData];
            const map = new Map();
            for (const item of merged) {
              const t = item?.timestamp?.seconds || Math.floor((item?.timestampMs || 0) / 1000);
              const key = `${item?.score || 0}-${t}-${item?.id || ''}`;
              if (!map.has(key)) map.set(key, item);
            }
            return Array.from(map.values())
              .sort((a, b) => {
                const at = a?.timestamp?.seconds || Math.floor((a?.timestampMs || 0) / 1000);
                const bt = b?.timestamp?.seconds || Math.floor((b?.timestampMs || 0) / 1000);
                return bt - at;
              })
              .slice(0, 15);
          });
        });

        return () => { unsubScore(); unsubHistory(); };
      }, [user]);

      useEffect(() => {
        if (gameState === 'counting') {
          const timer = setInterval(() => {
            setCountdown(p => {
              if (p <= 1) {
                finishLockRef.current = false;
                setGameState('playing');
                return 3;
              }
              return p - 1;
            });
          }, 1000);
          return () => clearInterval(timer);
        }
        if (gameState === 'playing') {
          const timer = setInterval(() => {
            setTimeLeft(p => {
              if (p <= 0.1) {
                if (!finishLockRef.current) {
                  finishLockRef.current = true;
                  setGameState('result');
                  handleFinish();
                }
                return 0;
              }
              return p - 0.1;
            });
          }, 100);
          return () => clearInterval(timer);
        }
      }, [gameState]);

      const handleFinish = async () => {
        setIsLocked(true);
        setCombo(0);

        const finalScore = scoreRef.current;
        writeLocalRecords(finalScore);

        if (db && user) {
          try {
            const historyColRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('history');
            await historyColRef.add({ score: finalScore, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            if (finalScore > highScoreRef.current) {
              const scoreDocRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stats').doc('overall');
              await scoreDocRef.set({ highScore: finalScore }, { merge: true });
            }
          } catch (e) { console.error("Save error", e); }
        }
        setTimeout(() => setIsLocked(false), 2000);
      };

      const currentLevel = useMemo(() => {
        return [...LEVELS].reverse().find(l => score >= l.min) || LEVELS[0];
      }, [score]);

      const spawnParticles = useCallback((x, y, scoreBase, level) => {
        const pCount = Math.min(4 + Math.floor(scoreBase / 80), 12);
        const newParticles = Array.from({ length: pCount }).map(() => ({
          id: Math.random(),
          x, y,
          vx: (Math.random() - 0.5) * (25 + scoreBase / 15),
          vy: (Math.random() - 0.5) * (25 + scoreBase / 15),
          color: level.ultimate ? `hsl(${Math.random() * 60 + 40}, 100%, 70%)` : `hsl(${180 + (scoreBase % 180)}, 100%, 65%)`,
          size: Math.random() * 12 + 2
        }));
        setParticles(p => [...p.slice(-36), ...newParticles]);

        if (particleCleanupRef.current) clearTimeout(particleCleanupRef.current);
        particleCleanupRef.current = setTimeout(() => {
          setParticles(p => p.slice(-36));
        }, 850);
      }, []);

      const registerTapAtPoint = useCallback((x, y) => {
        if (gameState !== 'playing') return;

        const scoreBase = scoreRef.current;
        const level = [...LEVELS].reverse().find(l => scoreBase >= l.min) || LEVELS[0];

        setScore(s => s + 1);
        const now = performance.now();
        setCombo(prev => (now - lastTapTimeRef.current < 250 ? prev + 1 : 1));
        lastTapTimeRef.current = now;

        spawnParticles(x, y, scoreBase, level);
      }, [gameState, spawnParticles]);

      const onTap = useCallback((e) => {
        if (gameState !== 'playing') return;
        if (touchHandledRef.current) return;
        if (e.cancelable) e.preventDefault();

        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX || rect.left + rect.width / 2;
        const y = e.clientY || rect.top + rect.height / 2;
        registerTapAtPoint(x, y);
      }, [gameState, registerTapAtPoint]);

      const onTouchStartTap = useCallback((e) => {
        if (gameState !== 'playing') return;
        if (e.cancelable) e.preventDefault();

        touchHandledRef.current = true;
        for (const touch of Array.from(e.changedTouches || [])) {
          if (activeTouchIdsRef.current.has(touch.identifier)) continue;
          activeTouchIdsRef.current.add(touch.identifier);
          registerTapAtPoint(touch.clientX, touch.clientY);
        }
      }, [gameState, registerTapAtPoint]);

      const onTouchEndTap = useCallback((e) => {
        for (const touch of Array.from(e.changedTouches || [])) {
          activeTouchIdsRef.current.delete(touch.identifier);
        }
        if (activeTouchIdsRef.current.size === 0) touchHandledRef.current = false;
      }, []);

      const onTouchCancelTap = useCallback((e) => {
        for (const touch of Array.from(e.changedTouches || [])) {
          activeTouchIdsRef.current.delete(touch.identifier);
        }
        if (activeTouchIdsRef.current.size === 0) touchHandledRef.current = false;
      }, []);

      const resetInteractiveState = useCallback(() => {
        activeTouchIdsRef.current.clear();
        touchHandledRef.current = false;
        lastTapTimeRef.current = 0;
        setCombo(0);
      }, []);

      const shake = gameState === 'playing' ? Math.min(combo / 6, 12) : 0;

      return (
        <div className={`fixed inset-0 text-white font-sans flex flex-col items-center justify-between overflow-hidden select-none touch-none bg-black transition-colors duration-700`}
             style={{ backgroundColor: gameState === 'playing' ? currentLevel.theme : 'black' }}>

          {/* Dynamic Background FX */}
          <div className="absolute inset-0 pointer-events-none transition-opacity duration-1000"
               style={{ 
                 opacity: gameState === 'playing' ? 0.3 : 0.1,
                 background: `radial-gradient(circle at center, ${currentLevel.ultimate ? '#fff' : '#0ea5e9'} 0%, transparent 80%)`,
                 filter: `hue-rotate(${score * 0.5}deg)`
               }} />

          {/* Shake Container */}
          <div className="w-full h-full flex flex-col items-center justify-between p-6 z-10"
               style={{ transform: `translate(${(Math.random()-0.5)*shake}px, ${(Math.random()-0.5)*shake}px)` }}>

            {/* Top HUD */}
            <div className="w-full flex justify-between items-start pt-4">
              <div className="flex flex-col">
                <span className="text-[10px] font-black tracking-widest text-white/30 uppercase">TIME LIMIT</span>
                <span className={`text-6xl font-black font-mono leading-none ${timeLeft < 5 ? 'text-red-500 italic animate-pulse' : 'text-white'}`}>
                  {smoothTime}
                </span>
              </div>
              <div className="flex flex-col items-end">
                <span className="text-[10px] font-black tracking-widest text-white/30 uppercase">HITS</span>
                <span className="text-6xl font-black font-mono leading-none" 
                      style={{ color: currentLevel.ultimate ? '#fde047' : '#22d3ee', textShadow: currentLevel.glow }}>
                  {smoothScore}
                </span>
              </div>
            </div>

            {/* Level Banner */}
            <div className={`px-10 py-3 rounded-full border-4 border-current font-black text-2xl italic tracking-tighter uppercase transition-all duration-500 ${currentLevel.color} bg-black/60 backdrop-blur-xl`}
                 style={{ boxShadow: currentLevel.glow, transform: `scale(${1 + (score/1000)})` }}>
              {currentLevel.label}
            </div>

            {/* Main Interaction Area */}
            <div className="relative w-full flex-1 flex items-center justify-center">
              {gameState === 'idle' && (
                <div className="flex flex-col items-center gap-10">
                  <div className="text-center">
                    <h1 className="text-8xl font-black italic tracking-tighter leading-[0.65] text-white">
                      TAP<br/><span className="text-white drop-shadow-[0_0_30px_white] text-9xl">OVERDRIVE</span>
                    </h1>
                  </div>
                  <button
                    onPointerDown={() => {
                      resetInteractiveState();
                      setScore(0);
                      setTimeLeft(30.0);
                      setGameState('counting');
                    }} 
                    className="bg-white text-black font-black py-8 px-24 rounded-3xl text-4xl shadow-[0_0_60px_rgba(255,255,255,0.4)] active:scale-95 transition-all">
                    START
                  </button>
                  <button onClick={() => setShowHistory(true)} className="text-white/20 font-black text-xs tracking-widest hover:text-white transition-colors">
                    [ ACCESS RECORDS ]
                  </button>
                </div>
              )}

              {gameState === 'counting' && (
                <div className="text-[20rem] font-black italic animate-ping text-white drop-shadow-[0_0_60px_white]">
                  {countdown}
                </div>
              )}

              {gameState === 'playing' && (
                <div
                  onPointerDown={onTap}
                  onTouchStart={onTouchStartTap}
                  onTouchEnd={onTouchEndTap}
                  onTouchCancel={onTouchCancelTap}
                  className="w-[88vw] h-[88vw] max-w-[400px] max-h-[400px] rounded-full border-[20px] border-white/10 flex items-center justify-center transition-all active:scale-90 bg-zinc-900/50 backdrop-blur-sm relative"
                  style={{ touchAction: 'none' }}>
                  <div className={`absolute inset-0 rounded-full border-4 border-white/5 ${score > 400 ? 'animate-spin-fast' : 'animate-spin-slow'}`} />
                  <p className="text-9xl font-black italic tracking-tighter text-white drop-shadow-2xl">TAP!</p>
                </div>
              )}
            </div>

            <div className="text-[10px] font-bold text-white/10 tracking-[0.5em] uppercase">BEST: {highScore}</div>
          </div>

          {/* Particle System */}
          {particles.map(p => (
            <div key={p.id} className="fixed rounded-full pointer-events-none z-50 animate-out-ultra"
                 style={{ left: p.x, top: p.y, width: p.size, height: p.size, backgroundColor: p.color, 
                          boxShadow: `0 0 20px ${p.color}`, transform: `translate(${p.vx * 15}px, ${p.vy * 15}px)` }} />
          ))}

          {/* Result Modal - Ultimate 3D Score Display */}
          {gameState === 'result' && (
            <div className="absolute inset-0 bg-black/98 z-[100] flex flex-col items-center justify-center p-8 animate-in zoom-in duration-500 perspective-1000">
              <p className="text-white/30 font-black tracking-[0.6em] mb-4 text-xl uppercase animate-pulse">OVERDRIVE FINISHED</p>

              <div className="relative mb-8 text-center animate-score-float">
                <span className="text-[14rem] font-black leading-none italic block origin-center skew-x-[-15deg] skew-y-[5deg] rotate-[-5deg]" 
                      style={{ color: currentLevel.ultimate ? '#fff' : 'white', textShadow: `${currentLevel.glow}, 10px 10px 0px rgba(255,255,255,0.1)` }}>
                  {score}
                </span>
                <p className="text-white/40 font-black tracking-[0.3em] uppercase mt-2">TOTAL HITS</p>
              </div>

              <div className={`px-14 py-5 rounded-2xl ${currentLevel.bg} text-black font-black text-4xl italic mb-14 shadow-2xl skew-x-[-10deg]`}
                   style={{ boxShadow: currentLevel.glow }}>
                {currentLevel.label}
              </div>

              <button
                disabled={isLocked}
                onPointerDown={() => {
                  if (isLocked) return;
                  resetInteractiveState();
                  setGameState('idle');
                }}
                className={`w-full max-w-sm py-8 rounded-[2.5rem] font-black text-3xl transition-all ${isLocked ? 'bg-zinc-800 text-zinc-600' : 'bg-white text-black active:scale-95 shadow-[0_0_50px_rgba(255,255,255,0.3)]'}`}>
                {isLocked ? "SAVING RECORD..." : "TRY AGAIN"}
              </button>
            </div>
          )}

          {/* History Modal */}
          {showHistory && (
            <div className="absolute inset-0 bg-black/99 z-[200] flex flex-col p-8 animate-in slide-in-from-bottom duration-500 overflow-hidden">
              <div className="flex justify-between items-center mb-10">
                <h2 className="text-5xl font-black italic tracking-tighter">RECORDS</h2>
                <button onClick={() => setShowHistory(false)} className="text-7xl font-thin">×</button>
              </div>
              <div className="flex-1 overflow-y-auto space-y-4 pb-20">
                {history.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full opacity-10 font-black italic text-3xl">NO LOGS</div>
                ) : history.map((h, i) => {
                  const hLevel = [...LEVELS].reverse().find(l => h.score >= l.min) || LEVELS[0];
                  return (
                    <div key={h.id || i} className="flex justify-between items-center bg-zinc-900/50 p-7 rounded-[2rem] border-l-[15px] border-white/5 transition-all"
                         style={{ borderColor: hLevel.ultimate ? 'gold' : 'rgba(255,255,255,0.1)' }}>
                      <div>
                        <p className="text-5xl font-black font-mono leading-none">{h.score}</p>
                        <p className="text-[10px] text-white/30 font-bold uppercase mt-2">
                          {h.timestamp ? new Date(h.timestamp.seconds * 1000).toLocaleString() : 'Processing...'}
                        </p>
                      </div>
                      <div className={`text-[11px] font-black italic ${hLevel.color} bg-white/5 px-4 py-2 rounded-xl border border-white/10 uppercase`}>
                        {hLevel.label}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="pt-4 flex gap-4">
                <button
                  onPointerDown={() => {
                    resetInteractiveState();
                    setShowHistory(false);
                    setScore(0);
                    setTimeLeft(30.0);
                    setCountdown(3);
                    setGameState('idle');
                  }}
                  className="flex-1 bg-white text-black font-black py-6 rounded-[2rem] text-2xl active:scale-95 transition-all shadow-[0_0_50px_rgba(255,255,255,0.3)]">
                  RESTART
                </button>
              </div>
            </div>
          )}

          <style dangerouslySetInnerHTML={{ __html: `
            @keyframes ping { 75%, 100% { transform: scale(2.2); opacity: 0; } }
            .animate-ping { animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite; }
            .animate-out-ultra { animation: fadeOutExtreme 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            @keyframes fadeOutExtreme { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(4); } }
            .animate-spin-slow { animation: spin 8s linear infinite; }
            .animate-spin-fast { animation: spin 2s linear infinite; }
            @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

            /* Result Score Animation */
            @keyframes score-float {
              0% { transform: translateY(20px) scale(0.8); opacity: 0; }
              100% { transform: translateY(0) scale(1); opacity: 1; }
            }
            .animate-score-float { animation: score-float 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

            .perspective-1000 { perspective: 1000px; }
          `}} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

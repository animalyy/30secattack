<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Tap Challenge Ultra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    html, body, #root { height: 100%; margin: 0; background: #000; }
    body { overflow: hidden; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
    .animate-out.fade-out { animation: fadeOut .5s ease-out forwards; }
    .animate-in.fade-in { animation: fadeIn .3s ease-out forwards; }
    .animate-in.slide-in-from-bottom { animation: slideInBottom .3s ease-out forwards; }
    @keyframes fadeOut {
      0% { opacity: 1; transform: scale(1) translate(0,0); }
      100% { opacity: 0; transform: scale(.6) translate(0,-10px); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideInBottom {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const LEVELS = [
      { min: 0, label: "ひよこ級", color: "text-slate-400", bg: "bg-slate-400" },
      { min: 100, label: "見習い連打士", color: "text-green-400", bg: "bg-green-400" },
      { min: 180, label: "中堅連打士", color: "text-blue-400", bg: "bg-blue-400" },
      { min: 240, label: "連打の達人", color: "text-purple-400", bg: "bg-purple-400" },
      { min: 300, label: "音速の貴公子", color: "text-orange-400", bg: "bg-orange-400" },
      { min: 360, label: "光速の指先", color: "text-red-500", bg: "bg-red-500" },
      { min: 420, label: "連打神", color: "text-yellow-400", bg: "bg-yellow-400" },
    ];

    function useSmoothValue(targetValue, precision = 0, speed = 0.18) {
      const [displayValue, setDisplayValue] = useState(targetValue);
      const rafRef = useRef(null);

      useEffect(() => {
        cancelAnimationFrame(rafRef.current);
        const step = () => {
          setDisplayValue(prev => {
            const diff = targetValue - prev;
            const threshold = precision > 0 ? 0.001 : 0.05;
            if (Math.abs(diff) < threshold) return targetValue;
            const next = prev + diff * speed;
            return diff > 0 ? Math.min(next, targetValue) : Math.max(next, targetValue);
          });
          rafRef.current = requestAnimationFrame(step);
        };
        rafRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(rafRef.current);
      }, [targetValue, precision, speed]);

      return precision === 0 ? Math.round(displayValue) : Number(displayValue).toFixed(precision);
    }

    function App() {
      const [user, setUser] = useState(null);
      const [score, setScore] = useState(0);
      const [highScore, setHighScore] = useState(0);
      const [history, setHistory] = useState([]);
      const [timeLeft, setTimeLeft] = useState(30.0);
      const [gameState, setGameState] = useState('idle');
      const [countdown, setCountdown] = useState(3);
      const [isLocked, setIsLocked] = useState(false);
      const [showHistory, setShowHistory] = useState(false);
      const [particles, setParticles] = useState([]);
      const [isFlashing, setIsFlashing] = useState(false);
      const [isShaking, setIsShaking] = useState(false);

      const appId = useMemo(() => (typeof window.__app_id !== 'undefined' ? window.__app_id : 'tap-challenge-pro-v2'), []);
      const dbRef = useRef(null);
      const authRef = useRef(null);
      const finishGuardRef = useRef(false);
      const timerStartRef = useRef(0);
      const flashTimeoutRef = useRef(null);
      const particleTimersRef = useRef([]);

      const smoothScore = useSmoothValue(score, 0, 0.22);
      const smoothTime = useSmoothValue(timeLeft, 1, 0.28);

      useEffect(() => {
        let unsubAuth = null;
        let mounted = true;

        const initFirebase = async () => {
          try {
            if (typeof firebase === 'undefined') return;
            const hasCfg = typeof window.__firebase_config !== 'undefined' && window.__firebase_config;
            if (!hasCfg) return;

            const firebaseConfig = typeof window.__firebase_config === 'string'
              ? JSON.parse(window.__firebase_config)
              : window.__firebase_config;

            if (!firebase.apps.length) {
              firebase.initializeApp(firebaseConfig);
            }
            authRef.current = firebase.auth();
            dbRef.current = firebase.firestore();

            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await authRef.current.signInWithCustomToken(window.__initial_auth_token);
            } else {
              await authRef.current.signInAnonymously();
            }

            unsubAuth = authRef.current.onAuthStateChanged(u => {
              if (mounted) setUser(u || null);
            });
          } catch (e) {
            console.warn('Firebase init skipped:', e);
          }
        };

        initFirebase();

        return () => {
          mounted = false;
          if (unsubAuth) unsubAuth();
        };
      }, []);

      useEffect(() => {
        if (!user || !dbRef.current) return;

        const db = dbRef.current;
        const scoreDocRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stats').doc('overall');
        const historyColRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('history');

        const unsubScore = scoreDocRef.onSnapshot((snap) => {
          if (snap.exists) setHighScore(snap.data().highScore || 0);
        });

        const unsubHistory = historyColRef.onSnapshot((snap) => {
          const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          const sorted = docs
            .sort((a, b) => ((b.timestamp && b.timestamp.seconds) || 0) - ((a.timestamp && a.timestamp.seconds) || 0))
            .slice(0, 10);
          setHistory(sorted);
        });

        return () => {
          unsubScore();
          unsubHistory();
        };
      }, [user, appId]);

      useEffect(() => {
        if (gameState !== 'counting') return;
        const interval = setInterval(() => {
          setCountdown(prev => {
            if (prev <= 1) {
              clearInterval(interval);
              finishGuardRef.current = false;
              timerStartRef.current = performance.now();
              setTimeLeft(30.0);
              setScore(0);
              setGameState('playing');
              return 3;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [gameState]);

      useEffect(() => {
        if (gameState !== 'playing') return;
        let rafId = null;
        const durationMs = 30000;

        const tick = (now) => {
          const elapsed = now - timerStartRef.current;
          const next = Math.max(0, (durationMs - elapsed) / 1000);
          setTimeLeft(next);

          if (next <= 0) {
            if (!finishGuardRef.current) {
              finishGuardRef.current = true;
              setGameState('result');
              handleFinish();
            }
            return;
          }
          rafId = requestAnimationFrame(tick);
        };

        rafId = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafId);
      }, [gameState]);

      useEffect(() => {
        return () => {
          clearTimeout(flashTimeoutRef.current);
          particleTimersRef.current.forEach(clearTimeout);
        };
      }, []);

      const handleFinish = async () => {
        setIsLocked(true);

        try {
          const localHistoryKey = `${appId}_history`;
          const localHighKey = `${appId}_highScore`;

          const newEntry = { score, timestampMs: Date.now() };
          const existingHistory = JSON.parse(localStorage.getItem(localHistoryKey) || '[]');
          const mergedHistory = [newEntry, ...existingHistory].slice(0, 10);
          localStorage.setItem(localHistoryKey, JSON.stringify(mergedHistory));
          setHistory(mergedHistory.map((h, i) => ({
            id: `${h.timestampMs}_${i}`,
            score: h.score,
            timestamp: { seconds: Math.floor((h.timestampMs || Date.now()) / 1000) }
          })));

          const nextHigh = Math.max(score, Number(localStorage.getItem(localHighKey) || 0));
          localStorage.setItem(localHighKey, String(nextHigh));
          setHighScore(nextHigh);

          if (user && dbRef.current) {
            const db = dbRef.current;
            const historyColRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('history');
            await historyColRef.add({
              score,
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            if (score > highScore) {
              const scoreDocRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stats').doc('overall');
              await scoreDocRef.set({ highScore: score }, { merge: true });
            }
          }
        } catch (e) {
          console.warn('Save skipped:', e);
        } finally {
          setTimeout(() => setIsLocked(false), 1500);
        }
      };

      useEffect(() => {
        const localHistoryKey = `${appId}_history`;
        const localHighKey = `${appId}_highScore`;
        try {
          const existingHistory = JSON.parse(localStorage.getItem(localHistoryKey) || '[]');
          setHistory(existingHistory.slice(0, 10).map((h, i) => ({
            id: `${h.timestampMs}_${i}`,
            score: h.score,
            timestamp: { seconds: Math.floor((h.timestampMs || Date.now()) / 1000) }
          })));
          setHighScore(Number(localStorage.getItem(localHighKey) || 0));
        } catch (e) {
          console.warn(e);
        }
      }, [appId]);

      const resetGame = () => {
        setScore(0);
        setTimeLeft(30.0);
        setCountdown(3);
        setParticles([]);
        setIsFlashing(false);
        setIsShaking(false);
        finishGuardRef.current = false;
        setGameState('idle');
      };

      const handlePointerDown = (e) => {
        if (gameState !== 'playing') return;
        if (e.cancelable) e.preventDefault();

        setScore(s => s + 1);
        setIsFlashing(true);
        setIsShaking(true);

        clearTimeout(flashTimeoutRef.current);
        flashTimeoutRef.current = setTimeout(() => {
          setIsFlashing(false);
          setIsShaking(false);
        }, 50);

        const rect = e.currentTarget.getBoundingClientRect();
        const point = e.touches && e.touches[0] ? e.touches[0] : e;
        const x = point.clientX || rect.left + rect.width / 2;
        const y = point.clientY || rect.top + rect.height / 2;

        const stamp = Date.now() + Math.random();
        const newP = Array.from({ length: 3 }).map((_, idx) => ({
          id: `${stamp}_${idx}`,
          x, y,
          vx: (Math.random() - 0.5) * 20,
          vy: (Math.random() - 0.5) * 20,
          color: `hsl(${Math.random() * 60 + 180}, 100%, 50%)`
        }));

        setParticles(prev => [...prev.slice(-15), ...newP]);

        const t = setTimeout(() => {
          setParticles(prev => prev.filter(p => !newP.some(np => np.id === p.id)));
        }, 520);
        particleTimersRef.current.push(t);
      };

      const currentLevel = [...LEVELS].reverse().find(l => score >= l.min) || LEVELS[0];

      return (
        <div className={`fixed inset-0 bg-black text-white font-sans flex flex-col items-center justify-between overflow-hidden select-none touch-none transition-colors duration-75 ${isFlashing ? 'bg-zinc-800' : 'bg-black'}`}>
          <div className="absolute inset-0 opacity-10 pointer-events-none bg-[radial-gradient(circle_at_center,_#06b6d4_0%,_transparent_70%)] animate-pulse" />

          <div className={`w-full h-full flex flex-col items-center justify-between p-4 py-8 ${isShaking ? 'scale-105 transition-transform' : ''}`}>
            <div className="w-full flex justify-between items-start z-10 px-2">
              <div className="text-left">
                <p className="text-[10px] font-black tracking-widest text-cyan-500 uppercase">Timer</p>
                <p className={`text-5xl font-black font-mono leading-none ${timeLeft < 5 ? 'text-red-500 italic' : ''}`}>{smoothTime}</p>
              </div>
              <div className="text-right">
                <p className="text-[10px] font-black tracking-widest text-cyan-500 uppercase">Hits</p>
                <p className="text-5xl font-black font-mono leading-none text-cyan-400 drop-shadow-[0_0_10px_#22d3ee]">{smoothScore}</p>
              </div>
            </div>

            <div className={`px-6 py-1 rounded-full border-2 border-current font-black text-lg italic ${currentLevel.color} bg-black/50 backdrop-blur-md`}>
              {currentLevel.label}
            </div>

            <div className="relative w-full flex-1 flex items-center justify-center">
              {gameState === 'idle' && (
                <div className="flex flex-col items-center gap-6">
                  <h1 className="text-5xl font-black italic tracking-tighter text-center leading-[0.8]">
                    TAP<br /><span className="text-cyan-500 text-6xl">CHALLENGE</span><br />ULTRA
                  </h1>
                  <button onPointerDown={() => setGameState('counting')} className="bg-white text-black font-black py-6 px-12 rounded-2xl text-2xl shadow-[0_0_40px_rgba(255,255,255,0.3)] active:scale-90 transition-transform">
                    START
                  </button>
                  <button onClick={() => setShowHistory(true)} className="text-cyan-500 font-black text-sm tracking-widest border-b border-cyan-500/30">
                    VIEW RECORDS
                  </button>
                </div>
              )}

              {gameState === 'counting' && (
                <div className="text-[12rem] font-black italic text-white animate-ping">{countdown}</div>
              )}

              {gameState === 'playing' && (
                <div
                  onPointerDown={handlePointerDown}
                  className="w-[75vw] h-[75vw] max-w-[320px] max-h-[320px] rounded-full border-8 border-white/20 flex items-center justify-center transition-transform active:scale-90 bg-gradient-to-br from-zinc-900 to-black shadow-[0_0_60px_rgba(0,0,0,0.5)]"
                >
                  <p className="text-7xl font-black italic drop-shadow-2xl">TAP!</p>
                </div>
              )}
            </div>

            <div className="text-center opacity-50">
              <p className="text-[8px] font-black tracking-[0.3em] uppercase">Best Record: {highScore}</p>
            </div>
          </div>

          {particles.map(p => (
            <div
              key={p.id}
              className="fixed w-3 h-3 rounded-full pointer-events-none z-50 animate-out fade-out duration-500"
              style={{ left: p.x, top: p.y, backgroundColor: p.color, transform: `translate(${p.vx}px, ${p.vy}px)` }}
            />
          ))}

          {gameState === 'result' && (
            <div className="absolute inset-0 bg-black/95 z-[100] flex flex-col items-center justify-center p-6 animate-in fade-in duration-300">
              <p className="text-cyan-500 font-black tracking-widest mb-2">TIME UP!</p>
              <p className="text-[8rem] font-black leading-none italic mb-2">{score}</p>
              <div className={`px-8 py-2 rounded-xl ${currentLevel.bg} text-black font-black text-2xl mb-8 transform -rotate-1`}>
                {currentLevel.label}
              </div>

              <div className="w-full max-w-[280px] bg-white/5 rounded-2xl p-4 mb-8">
                <p className="text-[10px] font-black text-zinc-500 mb-2 uppercase text-center">Stats</p>
                <div className="flex justify-between border-b border-white/10 py-1">
                  <span className="text-xs text-zinc-400">BEST</span>
                  <span className="font-bold">{highScore}</span>
                </div>
                <div className="flex justify-between py-1">
                  <span className="text-xs text-zinc-400">RANK</span>
                  <span className={`font-bold ${currentLevel.color}`}>{currentLevel.label}</span>
                </div>
              </div>

              <button
                disabled={isLocked}
                onPointerDown={() => !isLocked && resetGame()}
                className={`w-full max-w-[280px] py-5 rounded-2xl font-black text-xl transition-all ${isLocked ? 'bg-zinc-800 text-zinc-500' : 'bg-white text-black active:scale-95 shadow-lg'}`}
              >
                {isLocked ? "SAVING..." : "RETRY"}
              </button>
            </div>
          )}

          {showHistory && (
            <div className="absolute inset-0 bg-black/98 z-[200] flex flex-col p-8 animate-in slide-in-from-bottom duration-300">
              <div className="flex justify-between items-center mb-8">
                <h2 className="text-3xl font-black italic">RECORDS</h2>
                <button onClick={() => setShowHistory(false)} className="text-4xl font-light">×</button>
              </div>
              <div className="flex-1 overflow-y-auto space-y-3">
                {history.length === 0 ? (
                  <p className="text-zinc-500 text-center py-20 font-bold italic">NO DATA YET</p>
                ) : history.map((h, i) => (
                  <div key={h.id || i} className="flex justify-between items-center bg-white/5 p-4 rounded-xl border-l-4 border-cyan-500">
                    <div>
                      <p className="text-2xl font-black font-mono leading-none">{h.score}</p>
                      <p className="text-[8px] text-zinc-500 uppercase mt-1">
                        {h.timestamp ? new Date(h.timestamp.seconds * 1000).toLocaleString() : 'Saving...'}
                      </p>
                    </div>
                    <div className="text-[10px] font-black text-cyan-500 italic bg-cyan-500/10 px-2 py-1 rounded">
                      {([...LEVELS].reverse().find(l => h.score >= l.min) || LEVELS[0]).label}
                    </div>
                  </div>
                ))}
              </div>
              <p className="text-[10px] text-center text-zinc-600 mt-4 uppercase font-black">Showing last 10 attempts</p>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
